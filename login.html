<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Login Page</title>
    <style>
        /* Reset and Base Styles */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f4f8; /* Soft light blue-gray */
            background-image: radial-gradient(#d1dce8 1px, transparent 1px);
            background-size: 20px 20px; /* Subtle dot pattern */
            overflow: hidden;
        }

        /* Card Styling */
        .login-card {
            background: #ffffff;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 380px;
            text-align: center;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { color: #4a5568; margin-bottom: 1.5rem; font-weight: 600; }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            background: #f7fafc;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #a0aec0;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 10px;
            background: #63b3ed; /* Soft light blue */
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s;
        }

        button:hover {
            background: #4a90e2;
        }

        .loading {
            display: none;
            margin-top: 15px;
            color: #718096;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Sign In</h2>
        <form id="loginForm">
            <input type="text" placeholder="Username" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" id="submitBtn">Continue</button>
        </form>
        <div class="loading" id="loader">Processing...</div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const loader = document.getElementById('loader');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            btn.style.display = 'none';
            loader.style.display = 'block';
            
            setTimeout(() => {
                alert('Welcome back!');
                loader.style.display = 'none';
                btn.style.display = 'block';
            }, 1500);
        });
    </script>

</body>
</html>
